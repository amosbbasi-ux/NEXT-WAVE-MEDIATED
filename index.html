<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE NEXT WAVE MEDIA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

header {
  padding: 15px;
  background: black;
  display: flex;
  justify-content: space-between;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 15px;
}

.news-card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.news-card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 8px;
}
</style>
</head>
<div id="news"></div>
<body>

<header>
<h2>THE NEXT WAVE MEDIA</h2>
<button onclick="toggleMode()">🌙</button>
</header>

<h3 style="text-align:center;">International News</h3>

<div id="news" class="grid"></div>

<script>
async function getNews() {
  try {
    let res = await fetch("https://api.allorigins.win/raw?url=https://rss.cnn.com/rss/edition.rss");
    let text = await res.text();

    let parser = new DOMParser();
    let xml = parser.parseFromString(text, "text/xml");

    let items = xml.querySelectorAll("item");

    let newsDiv = document.getElementById("news");
    newsDiv.innerHTML = "";

    items.forEach((item, i) => {
      if(i > 10) return;

      let title = item.querySelector("title").textContent;
      let link = item.querySelector("link").textContent;

      let img = "https://picsum.photos/400/300?" + i;

      newsDiv.innerHTML += `
      <div class="news-card">
        <img src="${img}">
        <h4>${title}</h4>
        <a href="${link}" target="_blank">Read more</a>
      </div>
      `;
    });

  } catch (error) {
    document.getElementById("news").innerHTML = "Failed to load news.";
  }
}

getNews();
</script>
